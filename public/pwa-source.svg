<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="UN Lab">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="45%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <radialGradient id="bg" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#0c1220"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Safe-zone friendly: keep main art inside ~80% center for maskable -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="48" y="48" width="416" height="416" rx="96" fill="none" stroke="url(#g)" stroke-width="3" opacity="0.35"/>
  <g transform="translate(256 256)" filter="url(#glow)">
    <ellipse rx="118" ry="46" fill="none" stroke="url(#g)" stroke-width="14" transform="rotate(-32)"/>
    <ellipse rx="118" ry="46" fill="none" stroke="url(#g)" stroke-width="14" transform="rotate(32)"/>
    <ellipse rx="118" ry="46" fill="none" stroke="url(#g)" stroke-width="14"/>
    <circle r="28" fill="url(#g)"/>
    <circle cx="92" cy="-18" r="12" fill="#7dd3fc" opacity="0.95"/>
    <circle cx="-78" cy="52" r="10" fill="#a5b4fc" opacity="0.9"/>
    <circle cx="-24" cy="-88" r="9" fill="#e9d5ff" opacity="0.85"/>
  </g>
</svg>
